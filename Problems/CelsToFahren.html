<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>

    let cel=38;
    let fahrenheit;
    console.log(check(cel)); //changing values
    console.log(check(0));
    console.log(check(100));
    console.log(check(1));

    //its a mehtod that will convert celsius to fahrenheit
    function check(cel){
      fahrenheit=(9/5)*cel +32; //formula to convert
      return fahrenheit;
    }
  </script>
</body>
</html>
